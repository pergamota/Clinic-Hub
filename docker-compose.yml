services:
  db:
    image: mysql:8
    environment:
      - MYSQL_ROOT_PASSWORD=0000
      - MYSQL_DATABASE=clinichub_db
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_USERNAME=root
      - DB_PASSWORD=0000
      - JWT_SECRET=PX+JEb4LC=Z>Q8-~5)g7!?z`u,-4@`Q[
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data: